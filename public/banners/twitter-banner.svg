<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="40%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="100" x2="1500" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1500" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1500" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1500" y2="400" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="white" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="500" stroke="white" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="500" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1350" cy="100" r="200" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1400" cy="400" r="150" fill="rgba(255,255,255,0.03)"/>
  <circle cx="150" cy="420" r="120" fill="rgba(255,255,255,0.03)"/>

  <!-- Approval flow visualization (right side) -->
  <g transform="translate(950, 120)">
    <!-- Flow line -->
    <line x1="80" y1="40" x2="80" y2="260" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- Node 1: Trigger -->
    <rect x="20" y="10" width="120" height="50" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="80" y="30" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" opacity="0.7">TRIGGER</text>
    <text x="80" y="47" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600">Zapier Zap</text>

    <!-- Node 2: Pending -->
    <rect x="0" y="90" width="160" height="60" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(251,191,36,0.7)" stroke-width="2"/>
    <circle cx="24" cy="112" r="6" fill="#fbbf24"/>
    <text x="40" y="116" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" opacity="0.7">PENDING</text>
    <text x="80" y="137" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600">Awaiting Review</text>

    <!-- Node 3: Approved -->
    <rect x="20" y="180" width="120" height="50" rx="12" fill="rgba(74,222,128,0.2)" stroke="rgba(74,222,128,0.6)" stroke-width="1.5"/>
    <text x="80" y="200" text-anchor="middle" fill="#4ade80" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20">&#10003;</text>
    <text x="80" y="218" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600">Approved</text>

    <!-- Node 4: Execute -->
    <rect x="20" y="250" width="120" height="50" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="80" y="280" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="500" opacity="0.8">Execute Action</text>

    <!-- Arrow connectors -->
    <polygon points="80,62 75,70 85,70" fill="rgba(255,255,255,0.4)"/>
    <polygon points="80,152 75,160 85,160" fill="rgba(255,255,255,0.4)"/>
    <polygon points="80,232 75,240 85,240" fill="rgba(255,255,255,0.4)"/>

    <!-- Integration icons (right side) -->
    <g transform="translate(190, 20)">
      <rect width="100" height="30" rx="8" fill="rgba(255,255,255,0.1)"/>
      <text x="50" y="20" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" opacity="0.6">+ Make</text>
    </g>
    <g transform="translate(190, 60)">
      <rect width="100" height="30" rx="8" fill="rgba(255,255,255,0.1)"/>
      <text x="50" y="20" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" opacity="0.6">+ n8n</text>
    </g>
    <g transform="translate(190, 100)">
      <rect width="100" height="30" rx="8" fill="rgba(255,255,255,0.1)"/>
      <text x="50" y="20" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" opacity="0.6">+ Any API</text>
    </g>
  </g>

  <!-- Main text (left side) -->
  <g transform="translate(100, 130)">
    <!-- Logo text -->
    <text fill="white" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" letter-spacing="-2">
      OKrunit
    </text>

    <!-- Tagline -->
    <text y="60" fill="rgba(255,255,255,0.9)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500" letter-spacing="-0.5">
      The approval gateway for your
    </text>
    <text y="92" fill="rgba(255,255,255,0.9)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500" letter-spacing="-0.5">
      automations and AI agents.
    </text>

    <!-- Sub text -->
    <text y="140" fill="rgba(255,255,255,0.55)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="400">
      Human-in-the-loop approvals for Zapier, Make, n8n, and any API.
    </text>

    <!-- CTA pill -->
    <rect y="170" width="180" height="42" rx="21" fill="white"/>
    <text x="90" y="197" text-anchor="middle" fill="#1b5e20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">
      okrunit.com
    </text>
  </g>
</svg>
