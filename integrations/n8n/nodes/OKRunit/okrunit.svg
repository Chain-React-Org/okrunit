<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <defs>
    <linearGradient id="hex-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3f47"/>
      <stop offset="100%" stop-color="#2a2e35"/>
    </linearGradient>
    <linearGradient id="hex-green" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a8c2a"/>
      <stop offset="100%" stop-color="#7ab832"/>
    </linearGradient>
    <linearGradient id="check-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8cc63f"/>
      <stop offset="100%" stop-color="#6ba52a"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background - dark top -->
  <path d="M30 3L52 16V44L30 57L8 44V16Z" fill="url(#hex-dark)"/>
  <!-- Hexagon overlay - green bottom-left -->
  <path d="M30 57L8 44V28L30 38L30 57Z" fill="url(#hex-green)" opacity="0.85"/>
  <!-- White rounded square/shield -->
  <rect x="16" y="14" width="24" height="24" rx="4" fill="white"/>
  <!-- Green checkmark -->
  <path d="M23 26L27.5 30.5L37 21" stroke="url(#check-green)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow pointing right -->
  <path d="M38 30H52M52 30L47 25M52 30L47 35" stroke="#4a4f57" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
