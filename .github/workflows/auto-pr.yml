name: Auto PR & Merge

on:
  push:
    branches-ignore: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    name: Create PR and enable auto-merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update PR
        # Prefer a personal access token (PAT_TOKEN secret) so the squash
        # merge this workflow initiates actually triggers downstream
        # workflows like supabase-migrations.yml. GITHUB_TOKEN-initiated
        # events don't fire workflows — that's a GitHub-side limitation,
        # not a bug here. Falls back to GITHUB_TOKEN when PAT_TOKEN is
        # absent; the auto-merge still works, migrations just have to be
        # pushed manually via workflow_dispatch.
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # Check if there are actually changes vs main
          if git diff --quiet origin/main...HEAD; then
            echo "No changes between $BRANCH and main. Skipping PR creation"
            exit 0
          fi

          # Check if PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null)

          if [ -z "$EXISTING_PR" ]; then
            echo "Creating new PR from $BRANCH to main..."
            PR_URL=$(gh pr create \
              --title "$COMMIT_MSG" \
              --body "Auto-created PR for branch \`$BRANCH\`. Will auto-merge when CI passes." \
              --base main \
              --head "$BRANCH") || {
              echo "::error::Failed to create PR: $?"
              exit 1
            }
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "Created PR #$PR_NUMBER"
          else
            PR_NUMBER=$EXISTING_PR
            gh pr edit "$PR_NUMBER" --title "$COMMIT_MSG" || true
            echo "PR #$PR_NUMBER already exists, updated title"
          fi

          # Enable auto-merge (squash)
          gh pr merge "$PR_NUMBER" --auto --squash || true
